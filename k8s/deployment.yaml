# Secret is created manually via kubectl
# kubectl create secret generic pap-model-router-secrets -n agents \
#   --from-literal=jwt-secret='...' \
#   --from-literal=openai-api-key='...' \
#   --from-literal=anthropic-api-key='...' \
#   --from-literal=google-api-key='...' \
#   --from-literal=xai-api-key='...'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pap-model-router
  namespace: agents
  labels:
    app: pap-model-router
    component: model-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pap-model-router
  template:
    metadata:
      labels:
        app: pap-model-router
        component: model-router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: model-router
          image: ghcr.io/veriteknik/pap-model-router:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: SERVICE_VERSION
              value: "1.0.0"
            - name: SERVICE_REGION
              value: "eu-central"
            - name: MODEL_ROUTER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pap-model-router-secrets
                  key: jwt-secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pap-model-router-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pap-model-router-secrets
                  key: anthropic-api-key
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pap-model-router-secrets
                  key: google-api-key
            - name: XAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pap-model-router-secrets
                  key: xai-api-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pap-model-router
  namespace: agents
  labels:
    app: pap-model-router
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: pap-model-router
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pap-model-router
  namespace: agents
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - model-router.is.plugged.in
      secretName: model-router-tls
  rules:
    - host: model-router.is.plugged.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pap-model-router
                port:
                  number: 80
